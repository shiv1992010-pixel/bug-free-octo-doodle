<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Holi Wishing Script</title>
    
    <!-- Google Fonts for Dharmik Theme -->
    <link href="https://fonts.googleapis.com/css2?family=Yatra+One&family=Mukta:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Canvas Confetti Library for Firecracker/Color Effects -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Mukta', sans-serif;
            background: linear-gradient(135deg, #FF9933 0%, #cc2b5e 50%, #753a88 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            text-align: center;
            padding: 15px;
        }

        .main-container {
            background: rgba(255, 255, 255, 0.95);
            max-width: 450px;
            width: 100%;
            border-radius: 20px;
            padding: 30px 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 4px solid #FFD700; /* Gold border for Dharmik look */
            position: relative;
            z-index: 10;
        }

        /* Decorative top element */
        .main-container::before {
            content: '🕉️ 卐 🕉️';
            font-size: 24px;
            display: block;
            margin-bottom: 15px;
            color: #cc2b5e;
        }

        .greeting {
            font-family: 'Yatra One', cursive;
            font-size: 45px;
            color: #FF0000;
            text-shadow: 2px 2px 4px #FFD700, 0 0 15px #ff5100;
            animation: pulse 1.5s infinite alternate;
            margin-bottom: 5px;
        }

        .sender-name {
            font-size: 22px;
            color: #333;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .sender-name span {
            color: #e52d27;
            font-size: 28px;
            text-transform: uppercase;
            text-shadow: 1px 1px 2px #aaa;
        }

        .image-container img {
            max-width: 100%;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            border: 3px solid #FF9933;
            margin-bottom: 25px;
            animation: float 3s ease-in-out infinite;
        }

        .input-group {
            margin-top: 15px;
        }

        input[type="text"] {
            width: 90%;
            padding: 12px;
            font-size: 18px;
            border: 2px solid #FF9933;
            border-radius: 25px;
            outline: none;
            text-align: center;
            font-family: 'Mukta', sans-serif;
            font-weight: bold;
            color: #d31027;
            margin-bottom: 15px;
        }

        input[type="text"]:focus {
            border-color: #d31027;
            box-shadow: 0 0 10px rgba(211, 16, 39, 0.4);
        }

        .share-btn {
            background: linear-gradient(to right, #25D366, #128C7E);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            width: 90%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4);
            transition: transform 0.2s;
            margin: 0 auto;
        }

        .share-btn:active {
            transform: scale(0.95);
        }

        .share-btn svg {
            width: 24px;
            height: 24px;
            fill: white;
        }

        /* Animations */
        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.08); }
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        /* Confetti canvas */
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- Greeting Text -->
        <h1 class="greeting">Happy Holi</h1>
        <div class="sender-name" id="senderNameDisplay">
            मेरी तरफ से आपको और आपके परिवार को
        </div>

        <!-- Laxmi GIF Animation -->
        <div class="image-container">
            <img src="laxmi.gif" alt="Maa Laxmi Animation">
        </div>

        <!-- Create Own Link Section -->
        <div class="input-group">
            <p style="margin-bottom: 10px; color: #555; font-size: 14px; font-weight: bold;">
                यहाँ अपना नाम लिखें और दोस्तों को भेजें 👇
            </p>
            <input type="text" id="userName" placeholder="अपना नाम यहाँ लिखें..." autocomplete="off">
            
            <button class="share-btn" onclick="shareLink()">
                <!-- WhatsApp SVG Logo -->
                <svg viewBox="0 0 24 24">
                    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                </svg>
                WhatsApp पर शेयर करें
            </button>
        </div>
    </div>

    <!-- Script Section -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 1. URL से नाम निकालें (अगर किसी ने शेयर किया है)
            const urlParams = new URLSearchParams(window.location.search);
            const senderName = urlParams.get('n');
            const displayElement = document.getElementById('senderNameDisplay');

            if (senderName) {
                // अगर नाम है, तो उसे दिखाएँ
                displayElement.innerHTML = `<span>${senderName}</span> की तरफ से आपको और आपके परिवार को`;
            }

            // 2. पटाखे और रंगों का इफ़ेक्ट (Confetti)
            let duration = 5 * 1000; // 5 seconds
            let animationEnd = Date.now() + duration;
            let defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 100 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            let interval = setInterval(function() {
                let timeLeft = animationEnd - Date.now();

                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }

                let particleCount = 50 * (timeLeft / duration);
                
                // रंगों के पटाखे छोड़ें (Holi Theme)
                confetti(Object.assign({}, defaults, { 
                    particleCount, 
                    origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 },
                    colors: ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff']
                }));
                confetti(Object.assign({}, defaults, { 
                    particleCount, 
                    origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 },
                    colors: ['#ff9933', '#cc2b5e', '#753a88', '#FFD700']
                }));
            }, 250);
        });

        // 3. शेयर करने का फंक्शन
        function shareLink() {
            let nameInput = document.getElementById('userName').value.trim();
            
            if (nameInput === "") {
                alert("कृपया शेयर करने से पहले अपना नाम लिखें!");
                return;
            }

            // नया लिंक बनाना
            let currentUrl = window.location.origin + window.location.pathname;
            let shareUrl = currentUrl + "?n=" + encodeURIComponent(nameInput);
            
            let shareMessage = `*${nameInput}* ने आपके लिए एक खास सरप्राइज भेजा है! 🎁✨\nजल्दी से इस नीले लिंक पर क्लिक करके देखें 👇\n\n${shareUrl}`;

            // Web Share API (Mobile phones में डिफ़ॉल्ट शेयर मेनू खोलने के लिए)
            if (navigator.share) {
                navigator.share({
                    title: 'Happy Holi Greeting',
                    text: shareMessage,
                }).then(() => {
                    console.log('Thanks for sharing!');
                }).catch(console.error);
            } else {
                // अगर Web Share API काम न करे (जैसे Desktop पर), तो सीधे WhatsApp खोलें
                let whatsappUrl = `https://wa.me/?text=${encodeURIComponent(shareMessage)}`;
                window.location.href = whatsappUrl;
            }
        }
    </script>
</body>
  </html>
